services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: soundtide-agent
    restart: unless-stopped
    # SSDP and mDNS rely on multicast, which only works in host network mode.
    network_mode: host
    environment:
      # Time zone is critical: cron expressions are evaluated in the container's
      # local time, so without TZ the scheduler will fire at UTC.
      - TZ=${TZ:-UTC}
      - SOUNDTIDE_HTTP_PORT=${SOUNDTIDE_HTTP_PORT:-7780}
      - SOUNDTIDE_UPNP_PORT=${SOUNDTIDE_UPNP_PORT:-7790}
      - SOUNDTIDE_DATA_DIR=/data
      - SOUNDTIDE_LOG_LEVEL=${SOUNDTIDE_LOG_LEVEL:-info}
      - SOUNDTIDE_NAS_WOL_MAC=${SOUNDTIDE_NAS_WOL_MAC:-}
      - SOUNDTIDE_WORKER_URL=${SOUNDTIDE_WORKER_URL:-}
      - SOUNDTIDE_HOUSEHOLD_TOKEN=${SOUNDTIDE_HOUSEHOLD_TOKEN:-}
    volumes:
      - ./data:/data
